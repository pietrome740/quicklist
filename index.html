<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quicklist</title>

    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <img src="assets/logo.svg" alt="Logo" class="desktop-only">
    <main>
        <a href="#"><- Voltar</a>
        <h1>Compras da semana</h1>

        <form>
            <input type="text" placeholder="Adicionar um novo item" />
            <button class="button">Adicionar Item</button>
        </form>

        <ul role="list">
            <li>
                <input type="checkbox" name="Banana"/>
                <label for="Banana">Banana</label>
            </li>
            <li>
                <input type="checkbox" name="Leite"/>
                <label for="Leite">Leite</label>
            </li>
            <li>
                <input type="checkbox" name="Ovos"/>
                <label for="Ovos">Ovos</label>
            </li>
            <li>
                <input type="checkbox" name="Arroz"/>
                <label for="Arroz">Arroz</label>
            </li>
        </ul>

        
    </main>

    <script src="scripts.js"></script>    
</body>

</html>
