<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quicklist</title>

    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <img src="assets/logo.svg" alt="Logo" class="desktop-only">
    <main>
        <a href="#">&lt;- Voltar</a>
        <h1>Compras da semana</h1>

        <form>
            <input type="text" placeholder="Adicionar um novo item" />
            <button class="button">Adicionar Item</button>
        </form>

        <ul role="list">
            <li>
                <input type="checkbox" name="Pão de forma" />
                <label for="Pão de forma">Pão de forma</label>
                <button>
                    <img src="assets/trash.svg" alt="">
                </button>
            </li>
            <li>
                <input type="checkbox" name="Café Preto" />
                <label for="Café Preto">Café Preto</label>
                <button>
                    <img src="assets/trash.svg" alt="">
                </button>
            </li>
            <li>
                <input type="checkbox" name="Suco de laranja" />
                <label for="Suco de laranja">Suco de laranja</label>
                <button>
                    <img src="assets/trash.svg" alt="">
                </button>
            </li>
            <li>
                <input type="checkbox" name="Bolacha" />
                <label for="Bolacha">Bolacha</label>
                <button>
                    <img src="assets/trash.svg" alt="">
                </button>
            </li>
        </ul>

        <div class="alert hide">
            <img src="assets/alert.svg" alt="">
            <p>O item foi removido da lista.</p>
            <button>
                X
            </button>
        </div>
    </main>

    <script src="scripts.js"></script>
</body>

</html>
